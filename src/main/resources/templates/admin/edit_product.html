<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <section>
        <div class="container p-5 mt-1">
            <div class="row">
                <div class="col-md-8 offset-md-2">
                    <div class="card card-sh">
                        <div class="card-header text-center fs-4">
                            <p class="fs-4 fw-bold">Edit Product</p>

                             <th:block th:if="${session.succMsg}">
                                <p class="text-center text-success ">[[${session.succMsg}]]</p>
                                <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                            </th:block>

                            <th:block th:if="${session.errorMsg}">
                                <p class="text-center text-danger ">[[${session.errorMsg}]]</p>
                                <th:block th:text="${@commonServiceImpl.removeSessionMessage()}"></th:block>
                            </th:block>

                        </div>
                        <div class="card-body">
                            <form action="/admin/updateProduct" method="post" enctype="multipart/form-data">

                                <input type="hidden" name="id" th:value="${product.id}">

                                <div class="mb-3">
                                    <label>Enter Title</label><input type="text" name="title" class="form-control" th:value="${product.title}">
                                </div>

                                <div class="mb-3">
                                    <label>Enter Description</label>
                                    <textarea name="description" id="" rows="3" class="form-control">[[${product.description}]]</textarea>
                                </div>

                                <div class="row">
                                    <div class="mb-3 col">
                                        <label>Select Category</label>
                                        <select name="category" class="form-control">
                                            <option value="" disabled>Select Category</option>
                                            <option 
                                                th:each="c : ${categories}" 
                                                th:value="${c.name}" 
                                                th:text="${c.name}" 
                                                th:selected="${c.name == product.category}">
                                            </option>
                                        </select>
                                    </div>
                                    
                                    <div class="mb-3 col">
                                        <label>Enter Price (&#8377;)</label><input type="number" name="price" th:value="${product.price}" class="form-control">
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="mb-3 col">
                                        <label>Discount</label><input type="number" name="discount" th:value="${product.discount}" class="form-control">
                                    </div>
                                    
                                    <div class="mb-3 col">
                                        <label>Discounted Price (&#8377;)</label><input type="number" readonly th:value="${product.discountPrice}" class="form-control">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="">Status</label>

                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive" id="radioDefault1"
                                            th:checked="${product.isActive==true}" value="true">
                                        <label class="form-check-label" for="radioDefault1">
                                            Active
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="isActive" id="radioDefault2"
                                            th:checked="${product.isActive==false}" value="false">
                                        <label class="form-check-label" for="radioDefault2">
                                            Inactive
                                        </label>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="mb-3 col">
                                        <label>Enter Stock</label><input type="number" name="stock" th:value="${product.stock}" class="form-control">
                                    </div>

                                    <div class="mb-3 col">
                                        <label>Upload Image</label><input type="file" name="file" class="form-control">
                                    </div>

                                    <div class="mt-1 text-center">
                                        <img th:src="@{'/img/product_img/'+${product.image}}" alt="Image" width="100px" height="100px">
                                    </div>

                                </div>

                                <button class="btn btn-primary col-md-12">Update</button>

                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
