<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <section>
        <div class="container-fluid bg-primary">
            <div class="row">
                <div class="col-md-8 offset-md-2">
                    <form action="">
                        <div class="input-group mb-2">
                            <input type="text" class="form-control" name="ch">
                            <button class="btn text-dark ms-1 col-md-2" style="background-color: rgb(255, 255, 0);"><i
                                    class="fa-solid fa-magnifying-glass"></i> Search</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="container-fluid mt-1">
            <div class="row">
                <div class="col-md-2 p-0">
                    <div class="card shadow-sm p-0 mb-5 bg-body-tertiary rounded">
                        <div class="card-body">
                            <div class="list-group">
                                <p class="fs-5 text-center fw-bold">Category</p>
                                <a href="/products" class="list-group-item list-group-item-action" th:classappend="${paramValue == ''} ? 'active' : ''" aria-current="true">
                                   All
                                </a>
                                <a th:each="c:${categories}" th:href="@{'/products?category='+${c.name}}" th:classappend="${paramValue == c.name} ? 'active' : ''" class="list-group-item list-group-item-action">[[${c.name}]]</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-10">
                    <div class="card shadow-sm p-3 mb-5 bg-body-tertiary rounded">
                        <div class="card-body">
                            <p class="fs-3 text-center">Products</p>
                            <div class="row">

                                <th:block th:if="${products.size >0}">

                                <div class="col-md-3" th:each="p:${products}">
                                    <div class="card mt-3">
                                        <div class="card-body">
                                            <img th:src="@{'/img/product_img/'+${p.image}}" alt="" width="100%" height="150px">
                                            <p class="fs-5 text-center">[[${p.title}]]</p>
                                            <div class="row text-center">
                                                <p class="fs-6">
                                                  <span class="fs-6 fw-bold">&#8377;[[${p.discountPrice}]]</span><br>
                                                  <span class="fs-6 text-secoundary text-decoration-line-through"> &#8377;[[${p.price}]] </span> 
                                                  <span class="fs-6 text-success"> [[${p.discount}]]% off</span>
                                                </p>
                                                <a th:href="@{'/product/'+${p.id}}" class="btn btn-primary col-md-6 offset-md-3">View
                                                    Details</a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                </th:block>
                                
                                <th:block th:unless="${products.size >0}">
                                    <p class="fs-4 text-center mt-4 text-danger">Product not available</p>
                                </th:block>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
